# Self-contained bundle: React 18 + ReactDOM + Swiper + Clover IIIF Viewer.
# Exposes window.CloverViewer = { Viewer, React, ReactDOM }.
# Rebuilt via: cd build && npm run build
clover_iiif:
  version: 3.4.0
  js:
    js/clover-viewer.bundle.js: { minified: true, preprocess: false }

# This mounts Clover as a React App.
clover_strawberry:
  version: 1.0
  js:
    js/clover_strawberry.js: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - strawberryfield_clover/clover_iiif

# Mounts Clover Scroll as a React app.
clover_scroll:
  version: 1.0
  js:
    js/clover_scroll.js: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - strawberryfield_clover/clover_iiif

# Mounts Clover Slider as a React app.
clover_slider:
  version: 1.0
  js:
    js/clover_slider.js: {}
  dependencies:
    - core/drupal
    - core/once
    - core/drupalSettings
    - strawberryfield_clover/clover_iiif

# Data-attribute-driven behaviors for mounting Viewer, Scroll, or Slider
# from any Twig template — no PHP formatter required.
clover_data_attr:
  version: 1.0
  js:
    js/clover_data_attr.js: {}
  dependencies:
    - core/drupal
    - core/once
    - strawberryfield_clover/clover_iiif
